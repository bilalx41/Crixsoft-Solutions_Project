<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Player Pro</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <!-- Sidebar -->

    <aside class="playlist-box">

        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <h2>Music Player</h2>
        </div>

        <input
        type="text"
        id="searchSong"
        placeholder="🔍 Search songs...">

        <ul id="playlist">

            <li class="active" data-index="0">

                <div class="song-info">
                    <h4>Future Bass</h4>
                    <p>SigmaMusicArt</p>
                </div>

                <span>2:03</span>

            </li>

            <li data-index="1">

                <div class="song-info">
                    <h4>Funk & Breakbeat</h4>
                    <p>AlexGuz</p>
                </div>

                <span>2:04</span>

            </li>

            <li data-index="2">

                <div class="song-info">
                    <h4>Escape Your Love</h4>
                    <p>FASSounds</p>
                </div>

                <span>2:18</span>

            </li>

        </ul>

    </aside>

    <!-- Player -->

    <main class="player-box">

        <img
        id="cover"
        src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=1000"
        alt="cover">

        <div class="equalizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h1 id="title">Future Bass</h1>
        <h3 id="artist">SigmaMusicArt</h3>

        <audio id="audio"></audio>

        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="controls">

            <button id="prev">
                <i class="fas fa-backward"></i>
            </button>

            <button id="play">
                <i class="fas fa-play"></i>
            </button>

            <button id="next">
                <i class="fas fa-forward"></i>
            </button>

        </div>

        <div class="volume-box">

            <i class="fas fa-volume-up"></i>

            <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1">

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
